# Project-level gitleaks rules. Merged with the gitleaks default ruleset
# (generic API keys, AWS, GitHub tokens, etc.). The global pre-commit hook
# at ~/.git-hooks/pre-commit reads this file when present.
#
# Why a project-specific config: the default ruleset catches generic
# high-entropy patterns but doesn't know about our specific leak history.
# Past leak (force-pushed away, key rotated): personal test-proxy URL +
# its API key in README's quick-start.

title = "OpsBridge"

[extend]
# Keep the default ruleset; we only ADD project-specific patterns below.
useDefault = true

# ---------------------------------------------------------------------------
# Project-specific rules
# ---------------------------------------------------------------------------

[[rules]]
id = "opsbridge-test-proxy-url"
description = "Personal LLM test proxy URL — should never appear in committed files (use a placeholder)."
regex = '''cliapi\.yan\.today'''
tags = ["leak-history", "personal-endpoint"]

[[rules]]
id = "opsbridge-test-proxy-key"
description = "Known historical API key for the personal LLM test proxy — must never re-appear."
regex = '''sk-fly-to-sydney'''
tags = ["leak-history", "api-key"]

# ---------------------------------------------------------------------------
# Allowlist — places where these strings may legitimately appear as DOCS
# (e.g., a future post-mortem in PRD-phase3 or this very config itself).
# Add paths surgically; don't blanket-allowlist directories.
# ---------------------------------------------------------------------------

[allowlist]
description = "Files allowed to mention historical-leak strings for documentation purposes"
paths = [
    '''\.gitleaks\.toml$''',
]
